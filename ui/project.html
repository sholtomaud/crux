<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="/manifest.json">
  <title>crux — Project</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 0.25rem; }
    h2 { font-size: 1rem; color: #aaa; margin: 1.5rem 0 0.75rem; }
    .meta { font-size: 0.82rem; color: #666; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; color: #888; font-weight: 600; padding: 0.4rem 0.6rem; border-bottom: 1px solid #2a2a2a; }
    td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #1e1e1e; }
    tr.critical td { border-left: 2px solid #f87171; }
    .badge { font-size: 0.7rem; padding: 0.15em 0.5em; border-radius: 4px; font-weight: 600; }
    .badge-open      { background: #1e3a5f; color: #60a5fa; }
    .badge-inprogress{ background: #3a2e1a; color: #f59e0b; }
    .badge-blocked   { background: #3a1a1a; color: #f87171; }
    .badge-done      { background: #1a3a2a; color: #34d399; }
    .badge-dropped   { background: #2a2a2a; color: #888; }
    .status-select { font: inherit; font-size: 0.75rem; background: #1c1c1c; color: #ccc;
                      border: 1px solid #333; border-radius: 4px; padding: 0.1em 0.3em; cursor: pointer; }
    .task-row { cursor: pointer; }
    .task-row:hover td { background: #161616; }
    .disclosure { display: inline-block; width: 0.9em; color: #666; }
    .detail-row td { background: #141414; padding: 0.6rem 0.6rem 0.9rem 2.1rem; }
    .deps { display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.78rem; }
    .dep-label { color: #666; margin-right: 0.5rem; }
    .dep-empty { color: #444; }
    .depchip { display: inline-block; background: #1c1c1c; border: 1px solid #333; border-radius: 4px;
               padding: 0.1em 0.5em; font-family: monospace; font-size: 0.75rem; color: #ccc; margin-right: 0.35rem; }
    .critical-path { padding: 0.75rem 1rem; background: #1a1a1a; border-radius: 6px; font-size: 0.82rem; color: #ccc; margin-bottom: 1rem; }
    .critical-path .slug { color: #f87171; font-weight: 600; }
    .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat { background: #1a1a1a; border-radius: 6px; padding: 0.75rem 1rem; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .stat-label { font-size: 0.72rem; color: #666; margin-top: 0.2rem; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <p><a href="/">← all projects</a> <span id="nav-graph-wrap" hidden>· <a id="nav-graph" href="#">dependency graph →</a></span></p>
  <div id="content"><p class="loading">Loading…</p></div>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    renderNav('overview');
    const id = new URLSearchParams(location.search).get('id');
    const TASK_STATUSES = ['open', 'in-progress', 'blocked', 'done', 'dropped'];

    async function changeTaskStatus(slug, status) {
      try {
        await postJson(`/api/task/${id}/${slug}/status`, { status });
        render();
      } catch (e) { alert(`Failed to update status: ${e.message}`); render(); }
    }

    function toggleDetail(taskId) {
      const row  = document.getElementById(`detail-${taskId}`);
      const disc = document.getElementById(`disc-${taskId}`);
      row.hidden = !row.hidden;
      disc.textContent = row.hidden ? '▸' : '▾';
    }

    async function render() {
      const content = document.getElementById('content');
      if (!id) { content.innerHTML = '<p>No project id in URL.</p>'; return; }

      document.getElementById('nav-graph').href = `/graph?id=${id}`;
      document.getElementById('nav-graph-wrap').hidden = false;

      let data, cpm;
      try {
        [data, cpm] = await Promise.all([
          fetchJson(`/api/project/${id}`),
          fetchJson(`/api/cpm/${id}`),
        ]);
      } catch (e) { content.innerHTML = `<p style="color:#f87171">Error: ${e.message}</p>`; return; }

      const { project, tasks, status, roi, hours, deps } = data;

      const slugById = new Map(tasks.map(t => [t.id, t.slug]));
      const predMap = {}, succMap = {};
      for (const t of tasks) { predMap[t.id] = []; succMap[t.id] = []; }
      for (const d of deps) {
        if (succMap[d.predecessor_id]) succMap[d.predecessor_id].push(d.successor_id);
        if (predMap[d.successor_id])   predMap[d.successor_id].push(d.predecessor_id);
      }
      const depChips = (ids) => ids.length
        ? ids.map(tid => `<span class="depchip">${slugById.get(tid) ?? tid}</span>`).join('')
        : '<span class="dep-empty">none</span>';
      document.title = `crux — ${project.name}`;

      const roiScore = hours > 0 ? (roi.revenue / hours).toFixed(0) : '—';

      const stats = [
        { value: tasks.length,           label: 'Total tasks' },
        { value: status.done,            label: 'Done' },
        { value: status.open,            label: 'Open' },
        { value: status.in_progress,     label: 'In Progress' },
        { value: status.blocked,         label: 'Blocked' },
        { value: `${hours.toFixed(1)}h`, label: 'Hours' },
        { value: `$${roiScore}/hr`,      label: 'ROI' },
      ];

      // Group tasks by phase
      const phases = {};
      for (const t of tasks) {
        const k = t.phase ?? 'Unphased';
        if (!phases[k]) phases[k] = [];
        phases[k].push(t);
      }

      const criticalIds = new Set(cpm.nodes.filter(n => n.is_critical).map(n => n.id));

      content.innerHTML = `
        <h1>${project.name}</h1>
        <div class="meta">${project.type} · ${project.status} · created ${project.created_at.slice(0,10)}</div>
        <div class="stats">
          ${stats.map(s => `<div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('')}
        </div>
        ${cpm.critical_path.length > 0 ? `
          <h2>Critical Path</h2>
          <div class="critical-path">${cpm.critical_path.map(s => `<span class="slug">★ ${s}</span>`).join(' → ')}</div>
        ` : ''}
        ${Object.entries(phases).map(([phase, ptasks]) => `
          <h2>${phase}</h2>
          <table>
            <thead><tr><th>Slug</th><th>Title</th><th>Status</th><th>Duration</th><th>Float</th><th>GH</th></tr></thead>
            <tbody>
              ${ptasks.map(t => `
                <tr class="task-row ${criticalIds.has(t.id) ? 'critical' : ''}" onclick="toggleDetail(${t.id})">
                  <td><span class="disclosure" id="disc-${t.id}">▸</span><code>${t.slug}</code></td>
                  <td>${t.title}</td>
                  <td onclick="event.stopPropagation()">
                    <select class="status-select" onchange="changeTaskStatus('${t.slug}', this.value)">
                      ${TASK_STATUSES.map(s => `<option value="${s}" ${s === t.status ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                  </td>
                  <td>${t.duration_days ?? '—'}</td>
                  <td>${t.float_days !== null ? t.float_days.toFixed(1) : '—'}</td>
                  <td onclick="event.stopPropagation()">${t.gh_issue_number ? `<a href="https://github.com/${project.gh_repo}/issues/${t.gh_issue_number}" target="_blank">#${t.gh_issue_number}</a>` : '—'}</td>
                </tr>
                <tr class="detail-row" id="detail-${t.id}" hidden>
                  <td colspan="6">
                    <div class="deps">
                      <div><span class="dep-label">Predecessors:</span>${depChips(predMap[t.id])}</div>
                      <div><span class="dep-label">Successors:</span>${depChips(succMap[t.id])}</div>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`).join('')}
        <h2>ROI</h2>
        <table>
          <thead><tr><th>Metric</th><th>Value</th></tr></thead>
          <tbody>
            <tr><td>Hours invested</td><td>${hours.toFixed(1)}h</td></tr>
            <tr><td>Revenue</td><td>$${roi.revenue.toFixed(2)} AUD</td></tr>
            <tr><td>Cost</td><td>$${roi.cost.toFixed(2)} AUD</td></tr>
            <tr><td>Expected (prob-adj)</td><td>$${roi.expected.toFixed(2)} AUD</td></tr>
            <tr><td>ROI/hr</td><td>$${roiScore}/hr</td></tr>
          </tbody>
        </table>
      `;
    }

    render();
  </script>
</body>
</html>
