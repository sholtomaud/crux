<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crux — Overview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #fff; }
    .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }
    .kanban { display: flex; gap: 1.5rem; overflow-x: auto; padding-bottom: 1rem; }
    .lane { background: #1a1a1a; border-radius: 8px; padding: 1rem; min-width: 260px; flex-shrink: 0; }
    .lane h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 1rem; }
    .card { background: #252525; border-radius: 6px; padding: 0.85rem; margin-bottom: 0.75rem; cursor: pointer; transition: background 0.15s; }
    .card:hover { background: #2e2e2e; }
    .card-name { font-weight: 600; font-size: 0.95rem; color: #fff; margin-bottom: 0.4rem; }
    .card-meta { font-size: 0.78rem; color: #888; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { font-size: 0.7rem; padding: 0.15em 0.5em; border-radius: 4px; font-weight: 600; }
    .badge-open      { background: #1e3a5f; color: #60a5fa; }
    .badge-inprogress{ background: #3a2e1a; color: #f59e0b; }
    .badge-blocked   { background: #3a1a1a; color: #f87171; }
    .badge-done      { background: #1a3a2a; color: #34d399; }
    .badge-dropped   { background: #2a2a2a; color: #888; }
    .progress-bar-wrap { background: #333; border-radius: 4px; height: 6px; position: relative; margin-top: 0.5rem; }
    .progress-bar-fill { background: #34d399; height: 100%; border-radius: 4px; transition: width 0.3s; }
    .progress-label { position: absolute; right: 0; top: -1.2rem; font-size: 0.7rem; color: #888; }
    .signals { margin-top: 2rem; padding: 1rem; background: #1a1a1a; border-radius: 8px; border-left: 3px solid #f59e0b; }
    .signals h2 { font-size: 0.85rem; color: #f59e0b; margin-bottom: 0.5rem; }
    .signals p { font-size: 0.82rem; color: #ccc; line-height: 1.6; }
    .loading { color: #666; font-size: 0.9rem; }
    .error { color: #f87171; font-size: 0.9rem; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <h1>crux</h1>
  <div class="subtitle">find your critical path</div>
  <div id="kanban" class="kanban"><p class="loading">Loading…</p></div>
  <div id="signals"></div>

  <script src="/app.js"></script>
  <script>
    const LANES = ['active', 'stalled', 'paused', 'done'];
    const LANE_LABELS = { active: 'Active', stalled: 'Stalled', paused: 'Paused', done: 'Completed' };

    async function render() {
      const kanban  = document.getElementById('kanban');
      const sigBox  = document.getElementById('signals');

      let projects;
      try { projects = await fetchJson('/api/overview'); }
      catch (e) { kanban.innerHTML = `<p class="error">Error: ${e.message}</p>`; return; }

      // Build lanes
      kanban.innerHTML = '';
      const grouped = Object.fromEntries(LANES.map(l => [l, []]));
      for (const p of projects) (grouped[p.status] ?? grouped['active']).push(p);

      for (const lane of LANES) {
        const laneEl = el('div', { className: 'lane' },
          el('h2', {}, LANE_LABELS[lane]),
          ...grouped[lane].map(p => {
            const pct = p.task_count > 0 ? Math.round(p.done_count / p.task_count * 100) : 0;
            const roiLabel = p.hours > 0 ? `$${(p.roi.revenue / p.hours).toFixed(0)}/hr` : '—';
            return el('a', { href: `/project?id=${p.id}` },
              el('div', { className: 'card' },
                el('div', { className: 'card-name' }, p.name),
                el('div', { className: 'card-meta' },
                  el('span', { innerHTML: statusBadge(p.type) }),
                  el('span', {}, `${p.done_count}/${p.task_count} tasks`),
                  el('span', {}, `${p.hours.toFixed(1)}h`),
                  el('span', {}, roiLabel),
                ),
                el('div', { innerHTML: progressBar(p.done_count, p.task_count) }),
              )
            );
          })
        );
        kanban.appendChild(laneEl);
      }

      // Signals
      const warnings = [];
      const active = projects.filter(p => p.status === 'active');
      if (active.length > 2) warnings.push(`⚠ SPREAD: ${active.length} active projects — focus peak is typically 2`);
      if (warnings.length > 0) {
        sigBox.innerHTML = `<div class="signals"><h2>Signals</h2>${warnings.map(w => `<p>${w}</p>`).join('')}</div>`;
      }
    }

    render();
  </script>
</body>
</html>
