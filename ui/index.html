<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="/manifest.json">
  <title>crux — Overview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    .page-header { margin-bottom: 1.75rem; }
    .page-title { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .page-sub { font-size: 0.8rem; color: #555; margin-top: 0.2rem; }
    .kanban { display: flex; gap: 1.25rem; overflow-x: auto; padding-bottom: 1rem; }
    .lane { background: #141414; border-radius: 10px; padding: 1rem; min-width: 240px; flex: 1; max-width: 320px; }
    .lane-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: #555;
                   margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: space-between; }
    .lane-count { background: #222; color: #888; border-radius: 10px; padding: 0.1em 0.5em; font-size: 0.65rem; }
    .card { background: #1c1c1c; border: 1px solid #242424; border-radius: 8px; padding: 0.85rem;
            margin-bottom: 0.6rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .card:hover { background: #222; border-color: #333; }
    .card:last-child { margin-bottom: 0; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; }
    .card-num { font-size: 0.7rem; color: #444; font-weight: 600; flex-shrink: 0; padding-top: 0.1rem; }
    .card-name { font-weight: 600; font-size: 0.9rem; color: #f0f0f0; line-height: 1.3; }
    .card-meta { font-size: 0.75rem; color: #666; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 0.65rem; padding: 0.15em 0.5em; border-radius: 4px; font-weight: 600; }
    .badge-open      { background: #1a2f4a; color: #60a5fa; }
    .badge-inprogress{ background: #3a2e1a; color: #f59e0b; }
    .badge-blocked   { background: #3a1a1a; color: #f87171; }
    .badge-done      { background: #162a1e; color: #34d399; }
    .badge-dropped   { background: #222; color: #666; }
    .status-select { font: inherit; font-size: 0.7rem; background: #1c1c1c; color: #ccc;
                      border: 1px solid #333; border-radius: 4px; padding: 0.1em 0.3em; cursor: pointer; }
    .progress-bar-wrap { background: #2a2a2a; border-radius: 3px; height: 4px; }
    .progress-bar-fill { background: #34d399; height: 100%; border-radius: 3px; transition: width 0.4s; }
    .signals { margin-top: 2rem; padding: 0.9rem 1rem; background: #161207; border-radius: 8px;
               border-left: 3px solid #f59e0b; }
    .signals-title { font-size: 0.75rem; color: #f59e0b; font-weight: 600; margin-bottom: 0.4rem; }
    .signals p { font-size: 0.8rem; color: #aaa; line-height: 1.6; }
    .loading { color: #444; font-size: 0.85rem; padding: 2rem 0; }
    .error { color: #f87171; font-size: 0.85rem; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="page-title">Projects</div>
    <div class="page-sub">find your critical path</div>
  </div>
  <div id="kanban" class="kanban"><p class="loading">Loading…</p></div>
  <div id="signals"></div>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    renderNav('overview');

    const LANES = ['active', 'stalled', 'paused', 'done'];
    const LANE_LABELS = { active: 'Active', stalled: 'Stalled', paused: 'Paused', done: 'Completed' };
    const PROJECT_STATUSES = ['active', 'stalled', 'paused', 'done', 'dropped'];

    async function changeProjectStatus(id, status) {
      try {
        await postJson(`/api/project/${id}/status`, { status });
        render();
      } catch (e) { alert(`Failed to update status: ${e.message}`); render(); }
    }

    async function render() {
      const kanban = document.getElementById('kanban');
      const sigBox = document.getElementById('signals');

      let projects;
      try { projects = await fetchJson('/api/overview'); }
      catch (e) { kanban.innerHTML = `<p class="error">Error: ${e.message}</p>`; return; }

      kanban.innerHTML = '';
      const grouped = Object.fromEntries(LANES.map(l => [l, []]));
      for (const p of projects) (grouped[p.status] ?? grouped['active']).push(p);

      for (const lane of LANES) {
        const cards = grouped[lane];
        const laneEl = el('div', { className: 'lane' },
          el('div', { className: 'lane-header' },
            el('span', {}, LANE_LABELS[lane]),
            el('span', { className: 'lane-count' }, String(cards.length)),
          ),
          ...cards.map(p => {
            const roiLabel = p.hours > 0 ? `$${(p.roi.revenue / p.hours).toFixed(0)}/hr` : '—';
            return el('a', { href: `/project?id=${p.id}` },
              el('div', { className: 'card' },
                el('div', { className: 'card-top' },
                  el('div', { className: 'card-name' }, p.name),
                  el('div', { className: 'card-num' }, `#${p.number ?? p.project_number ?? ''}`),
                ),
                el('div', { className: 'card-meta' },
                  el('span', { innerHTML: statusBadge(p.type) }),
                  el('span', {}, `${p.done_count}/${p.task_count} tasks`),
                  el('span', {}, `${p.hours.toFixed(1)}h`),
                  el('span', {}, roiLabel),
                  el('select', {
                    className: 'status-select',
                    onclick: 'event.stopPropagation()',
                    onchange: `event.stopPropagation(); changeProjectStatus('${p.id}', this.value)`,
                    innerHTML: PROJECT_STATUSES.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join(''),
                  }),
                ),
                el('div', { innerHTML: progressBar(p.done_count, p.task_count) }),
              )
            );
          })
        );
        kanban.appendChild(laneEl);
      }

      const active = projects.filter(p => p.status === 'active');
      if (active.length > 2) {
        sigBox.innerHTML = `
          <div class="signals">
            <div class="signals-title">Signals</div>
            <p>⚠ SPREAD: ${active.length} active projects — focus peak is typically 2</p>
          </div>`;
      }
    }

    render();
  </script>
</body>
</html>
