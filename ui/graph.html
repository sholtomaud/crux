<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crux — Dependency Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    a { color: #60a5fa; text-decoration: none; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 1.5rem; }
    #graph-container { overflow: auto; }
    svg { max-width: 100%; }
    .loading { color: #666; }
    /* Dagre-d3 nodes */
    .node rect { fill: #252525; stroke: #444; rx: 6; }
    .node.critical rect { fill: #3a1a1a; stroke: #f87171; }
    .node text { fill: #e0e0e0; font-family: monospace; font-size: 12px; }
    .edgePath path { stroke: #555; fill: none; stroke-width: 1.5; }
    .edgePath.critical path { stroke: #f87171; stroke-width: 2; }
    .legend { display: flex; gap: 1rem; font-size: 0.78rem; color: #888; margin-bottom: 1rem; }
    .legend span { display: flex; align-items: center; gap: 0.3rem; }
    .dot { width: 10px; height: 10px; border-radius: 2px; }
    .dot-crit { background: #3a1a1a; border: 1px solid #f87171; }
    .dot-norm { background: #252525; border: 1px solid #444; }
  </style>
</head>
<body>
  <p><a href="/">← all projects</a></p>
  <h1>Dependency Graph</h1>
  <div class="legend">
    <span><div class="dot dot-crit"></div> Critical path</span>
    <span><div class="dot dot-norm"></div> Non-critical</span>
  </div>
  <div id="graph-container"><p class="loading">Loading…</p></div>

  <!-- d3 + dagre-d3 via CDN (local tool, CDN is fine) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre-d3@0.6.4/dist/dagre-d3.min.js"></script>
  <script src="/app.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id');

    async function render() {
      const container = document.getElementById('graph-container');
      if (!id) { container.innerHTML = '<p>No project id in URL.</p>'; return; }

      let data, cpm;
      try {
        [data, cpm] = await Promise.all([
          fetchJson(`/api/project/${id}`),
          fetchJson(`/api/cpm/${id}`),
        ]);
      } catch (e) { container.innerHTML = `<p style="color:#f87171">Error: ${e.message}</p>`; return; }

      document.title = `crux — ${data.project.name} graph`;

      const critIds = new Set(cpm.nodes.filter(n => n.is_critical).map(n => n.id));
      const idToSlug = Object.fromEntries(data.tasks.map(t => [t.id, t.slug]));
      const idToTitle = Object.fromEntries(data.tasks.map(t => [t.id, t.title]));

      // Build dagre graph
      const g = new dagreD3.graphlib.Graph().setGraph({ rankdir: 'LR', ranksep: 60, nodesep: 30 });

      for (const t of data.tasks) {
        g.setNode(t.id, {
          label: `${t.slug}\n${t.title.slice(0, 24)}`,
          class: critIds.has(t.id) ? 'critical' : '',
          width: 120, height: 40,
        });
      }

      // Get deps from CPM edges (stored per-task)
      const deps = await fetchJson(`/api/db/dependencies`);
      const taskIds = new Set(data.tasks.map(t => t.id));
      for (const d of deps) {
        if (taskIds.has(d.predecessor_id) && taskIds.has(d.successor_id)) {
          g.setEdge(d.predecessor_id, d.successor_id, {
            class: critIds.has(d.predecessor_id) && critIds.has(d.successor_id) ? 'critical' : '',
          });
        }
      }

      container.innerHTML = '';
      const svg = d3.select(container).append('svg').attr('width', '100%').attr('height', 600);
      const inner = svg.append('g');
      const render = new dagreD3.render();
      render(inner, g);

      // Auto-zoom to fit
      const bounds = inner.node().getBBox();
      const W = parseInt(svg.style('width'));
      const scale = Math.min(1, (W - 40) / bounds.width);
      svg.call(d3.zoom().on('zoom', e => inner.attr('transform', e.transform)));
      inner.attr('transform', `translate(20,20) scale(${scale})`);
      svg.attr('height', Math.max(600, bounds.height * scale + 40));
    }

    render();
  </script>
</body>
</html>
